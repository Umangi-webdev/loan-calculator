<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="calculator">
            <h2>Loan Calculator</h2>
            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" placeholder="Enter Loan Amount" id="loanAmountInput" />
                <label>Interest Rate(%)</label>
                <input type="number" placeholder="Enter Interest rate" id="interestRate" />
                <label>Loan Term (in months)</label>
                <input type="number" placeholder="Enter The Loan term" id="loanTermInput" />
            </div>
            <button id="calculateBtn">Calculate</button>
            <div id="result">Final Result</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
